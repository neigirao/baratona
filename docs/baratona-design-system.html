<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baratona — Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #0A0A0F; color: #F0EDE8; font-family: 'DM Sans', sans-serif; }

:root {
  --gold: #F5A623; --gold-light: #FFD166; --amber: #E8850A;
  --dark: #0A0A0F; --dark2: #0D0D15; --card: #13131B; --card2: #181820;
  --border: #1E1E2A; --text: #F0EDE8; --muted: #5A5A6A;
  --green: #2ECC71; --red: #E74C3C; --blue: #3B82F6; --purple: #A855F7;
}

/* NAV */
.ds-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid #1A1A24;
  padding: 0 32px;
  display: flex; align-items: center; gap: 0; height: 52px;
  overflow-x: auto;
}
.ds-nav-logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  color: #F5A623; letter-spacing: 3px; margin-right: 32px; white-space: nowrap;
  flex-shrink: 0;
}
.ds-nav a {
  color: #555; text-decoration: none; font-size: 13px; font-weight: 500;
  padding: 0 14px; height: 52px; display: flex; align-items: center;
  white-space: nowrap; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.ds-nav a:hover { color: #ccc; }
.ds-nav a.active { color: #F5A623; border-bottom-color: #F5A623; }

/* LAYOUT */
.ds-layout { display: flex; min-height: 100vh; }
.ds-sidebar {
  width: 220px; flex-shrink: 0;
  background: #0D0D15; border-right: 1px solid #1A1A24;
  position: sticky; top: 52px; height: calc(100vh - 52px);
  overflow-y: auto; padding: 24px 0;
}
.ds-sidebar-group { margin-bottom: 24px; }
.ds-sidebar-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #F5A623;
  padding: 0 20px 8px; display: block;
}
.ds-sidebar a {
  display: block; padding: 7px 20px; font-size: 13px; color: #555;
  text-decoration: none; transition: color 0.15s, background 0.15s;
}
.ds-sidebar a:hover { color: #ccc; background: rgba(255,255,255,0.03); }
.ds-sidebar a.active { color: #F5A623; background: rgba(245,166,35,0.06); border-left: 2px solid #F5A623; }

.ds-content { flex: 1; min-width: 0; padding: 48px clamp(24px,4vw,64px) 80px; }

/* SECTIONS */
.ds-section { margin-bottom: 80px; }
.ds-section-header {
  display: flex; align-items: baseline; gap: 16px;
  margin-bottom: 32px; padding-bottom: 16px;
  border-bottom: 1px solid #1A1A24;
}
.ds-section-title {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #F0EDE8;
}
.ds-section-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: #F5A623; background: rgba(245,166,35,0.1); padding: 2px 8px; border-radius: 99px;
}

/* TOKEN TABLE */
.token-grid { display: grid; gap: 8px; }
.token-row {
  background: #13131B; border: 1px solid #1E1E2A; border-radius: 10px;
  padding: 12px 16px; display: grid; grid-template-columns: 120px 1fr auto;
  align-items: center; gap: 16px;
}
.token-name { font-family: 'DM Sans', monospace; font-size: 12px; color: #F5A623; }
.token-desc { font-size: 13px; color: #777; }
.token-val { font-family: monospace; font-size: 12px; color: #555; }

/* SWATCH */
.swatch-grid { display: flex; flex-wrap: wrap; gap: 12px; }
.swatch-card {
  display: flex; flex-direction: column; gap: 8px; width: 140px;
}
.swatch-color {
  height: 64px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
}
.swatch-info { padding: 0 2px; }
.swatch-name { font-size: 12px; font-weight: 600; color: #ccc; }
.swatch-hex { font-family: monospace; font-size: 11px; color: #555; }

/* TYPE SCALE */
.type-sample { margin-bottom: 20px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.type-meta { font-size: 11px; color: #444; white-space: nowrap; }

/* COMPONENT GRID */
.comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.comp-card {
  background: #13131B; border: 1px solid #1E1E2A; border-radius: 14px;
  overflow: hidden;
}
.comp-card-header {
  padding: 12px 16px; border-bottom: 1px solid #1A1A24;
  display: flex; align-items: center; justify-content: space-between;
}
.comp-card-title { font-size: 12px; font-weight: 600; color: #888; }
.comp-card-body { padding: 24px 20px; }

/* SPACING VISUAL */
.spacing-grid { display: flex; flex-direction: column; gap: 8px; }
.spacing-row { display: flex; align-items: center; gap: 16px; }
.spacing-bar { background: rgba(245,166,35,0.2); border: 1px solid rgba(245,166,35,0.3); border-radius: 3px; height: 20px; }
.spacing-label { font-family: monospace; font-size: 12px; color: #555; min-width: 60px; }
.spacing-desc { font-size: 12px; color: #444; }

/* ICON GRID */
.icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
.icon-card {
  background: #13131B; border: 1px solid #1E1E2A; border-radius: 10px;
  padding: 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-size: 11px; color: #555; text-align: center;
}
.icon-card svg { color: #888; }

/* MOTION */
.motion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.motion-card {
  background: #13131B; border: 1px solid #1E1E2A; border-radius: 12px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.motion-demo {
  height: 48px; display: flex; align-items: center; justify-content: center;
}
.motion-dot {
  width: 12px; height: 12px; border-radius: 50%; background: #F5A623;
}

@media (max-width: 768px) {
  .ds-sidebar { display: none; }
  .ds-layout { display: block; }
  .ds-content { padding: 32px 20px 80px; }
  .token-row { grid-template-columns: 1fr; gap: 4px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="ds-nav">
  <span class="ds-nav-logo">BARATONA</span>
  <a href="#cores" class="active">Cores</a>
  <a href="#tipografia">Tipografia</a>
  <a href="#espacamento">Espaçamento</a>
  <a href="#componentes">Componentes</a>
  <a href="#icones">Ícones</a>
  <a href="#motion">Motion</a>
  <a href="#tokens">Tokens CSS</a>
  <a href="#implementacao">Implementação</a>
</nav>

<div id="root"></div>

<script type="text/babel">
// ── ICONS ─────────────────────────────────────────────────────
const icons = {
  Beer: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 11h1a3 3 0 0 1 0 6h-1"/><path d="M5 11h12v10H5z"/><path d="M5 7h14l-1 4H6z"/></svg>,
  Map: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>,
  Star: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  Trophy: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M8 18h8"/><path d="M6 4h12v8a6 6 0 0 1-12 0V4z"/></svg>,
  Zap: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  Users: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Check: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  ArrowRight: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  Search: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Share: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
  ChevronDown: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
  Grid: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  List: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  Back: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
};

// ── SECTION WRAPPER ───────────────────────────────────────────
const Section = ({ id, title, tag, children }) => (
  <div className="ds-section" id={id}>
    <div className="ds-section-header">
      <h2 className="ds-section-title">{title}</h2>
      {tag && <span className="ds-section-tag">{tag}</span>}
    </div>
    {children}
  </div>
);

// ── TOKEN ROW ─────────────────────────────────────────────────
const Token = ({ name, desc, val }) => (
  <div className="token-row">
    <span className="token-name">{name}</span>
    <span className="token-desc">{desc}</span>
    <span className="token-val">{val}</span>
  </div>
);

// ── SWATCH ────────────────────────────────────────────────────
const Swatch = ({ color, name, hex, usage }) => (
  <div className="swatch-card">
    <div className="swatch-color" style={{ background: color }}/>
    <div className="swatch-info">
      <div className="swatch-name">{name}</div>
      <div className="swatch-hex">{hex}</div>
      {usage && <div style={{ fontSize: 11, color: '#444', marginTop: 3 }}>{usage}</div>}
    </div>
  </div>
);

// ── BUTTON DEMO ───────────────────────────────────────────────
const BtnPrimary = ({ children, size = 'md' }) => {
  const sizes = { sm: '8px 16px', md: '12px 24px', lg: '16px 32px' };
  const fonts = { sm: 13, md: 14, lg: 16 };
  const [hov, setHov] = React.useState(false);
  return (
    <button onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      background: '#F5A623', color: '#000', border: 'none',
      padding: sizes[size], borderRadius: 99,
      fontFamily: "'DM Sans',sans-serif", fontSize: fonts[size], fontWeight: 700,
      cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 8,
      boxShadow: hov ? '0 8px 24px rgba(245,166,35,0.4)' : '0 4px 16px rgba(245,166,35,0.25)',
      transform: hov ? 'translateY(-2px)' : '',
      transition: 'all 0.15s',
    }}>{children}</button>
  );
};

const BtnGhost = ({ children, size = 'md' }) => {
  const sizes = { sm: '7px 14px', md: '11px 22px', lg: '15px 30px' };
  const fonts = { sm: 13, md: 14, lg: 16 };
  const [hov, setHov] = React.useState(false);
  return (
    <button onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      background: 'transparent', color: hov ? '#F5A623' : '#ccc',
      border: `1px solid ${hov ? 'rgba(245,166,35,0.4)' : 'rgba(255,255,255,0.12)'}`,
      padding: sizes[size], borderRadius: 99,
      fontFamily: "'DM Sans',sans-serif", fontSize: fonts[size], fontWeight: 500,
      cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 8,
      transition: 'all 0.15s',
    }}>{children}</button>
  );
};

const BtnIcon = ({ children }) => {
  const [hov, setHov] = React.useState(false);
  return (
    <button onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      width: 38, height: 38, borderRadius: 10,
      background: hov ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)',
      border: '1px solid #252530', color: hov ? '#ccc' : '#555',
      cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
      transition: 'all 0.15s',
    }}>{children}</button>
  );
};

// ── BADGE / TAG ───────────────────────────────────────────────
const Badge = ({ children, variant = 'gold' }) => {
  const variants = {
    gold: { bg: 'rgba(245,166,35,0.12)', color: '#F5A623', border: 'rgba(245,166,35,0.25)' },
    green: { bg: 'rgba(46,204,113,0.1)', color: '#2ECC71', border: 'rgba(46,204,113,0.2)' },
    muted: { bg: 'rgba(255,255,255,0.05)', color: '#888', border: 'rgba(255,255,255,0.08)' },
    red: { bg: 'rgba(231,76,60,0.1)', color: '#E74C3C', border: 'rgba(231,76,60,0.2)' },
    purple: { bg: 'rgba(168,85,247,0.1)', color: '#A855F7', border: 'rgba(168,85,247,0.2)' },
  };
  const v = variants[variant];
  return (
    <span style={{
      fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
      padding: '3px 10px', borderRadius: 99,
      background: v.bg, color: v.color, border: `1px solid ${v.border}`,
      display: 'inline-flex', alignItems: 'center', gap: 5,
    }}>{children}</span>
  );
};

// ── INPUT ─────────────────────────────────────────────────────
const Input = ({ placeholder, icon }) => {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ position: 'relative', width: '100%' }}>
      {icon && <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: '#555' }}>{icon}</span>}
      <input
        placeholder={placeholder}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{
          width: '100%', background: '#0D0D15',
          border: `1px solid ${focus ? 'rgba(245,166,35,0.4)' : '#1E1E2A'}`,
          borderRadius: 10, padding: `10px ${icon ? '12px 10px 36px' : '12px'}`,
          color: '#F0EDE8', fontSize: 14, outline: 'none',
          transition: 'border-color 0.15s',
        }}
      />
    </div>
  );
};

// ── CARD ──────────────────────────────────────────────────────
const BarCardDemo = () => {
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      background: '#13131B',
      border: `1px solid ${hov ? 'rgba(245,166,35,0.25)' : '#1E1E2A'}`,
      borderRadius: 14, overflow: 'hidden',
      transform: hov ? 'translateY(-3px)' : '',
      boxShadow: hov ? '0 12px 40px rgba(0,0,0,0.4)' : '0 2px 8px rgba(0,0,0,0.2)',
      transition: 'all 0.2s', cursor: 'pointer', maxWidth: 240,
    }}>
      <div style={{
        height: 120, background: 'linear-gradient(135deg, #1a0e2a, #3a1a50)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        position: 'relative',
      }}>
        <span style={{ fontSize: 28, opacity: 0.3 }}>🍺</span>
        <span style={{
          position: 'absolute', top: 8, left: 8,
          background: 'rgba(0,0,0,0.6)', borderRadius: 6,
          padding: '2px 7px', fontSize: 11, fontWeight: 700, color: '#FFD166',
          backdropFilter: 'blur(4px)',
        }}>★ 9.1</span>
        <span style={{
          position: 'absolute', top: 8, right: 8,
          background: 'rgba(46,204,113,0.9)', borderRadius: 99,
          padding: '2px 8px', fontSize: 10, fontWeight: 700, color: '#000',
        }}>✓ Visitado</span>
      </div>
      <div style={{ padding: '14px 16px' }}>
        <p style={{ fontFamily: "'Syne',sans-serif", fontSize: 15, fontWeight: 700, color: '#F0EDE8', marginBottom: 4 }}>Pavão Azul</p>
        <p style={{ fontSize: 12, color: '#555', marginBottom: 8 }}>📍 Copacabana</p>
        <p style={{ fontSize: 12, color: '#666', lineHeight: 1.5, marginBottom: 12 }}>Camarão na chapa com farofa</p>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={{
            flex: 1, background: 'rgba(46,204,113,0.1)', border: '1px solid rgba(46,204,113,0.3)',
            borderRadius: 8, padding: '8px', color: '#2ECC71', fontSize: 12, fontWeight: 700, cursor: 'pointer',
          }}>✓ Check-in feito</button>
          <button style={{
            width: 34, height: 34, borderRadius: 8, background: 'rgba(255,255,255,0.04)',
            border: '1px solid #252530', color: '#555', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{icons.Map}</button>
        </div>
      </div>
    </div>
  );
};

// ── MOTION DEMO ───────────────────────────────────────────────
const MotionCard = ({ label, duration, easing, property }) => {
  const [active, setActive] = React.useState(false);
  return (
    <div className="motion-card">
      <div className="motion-demo">
        <div className="motion-dot" style={{
          transform: active ? 'translateX(60px)' : 'translateX(-60px)',
          transition: `transform ${duration} ${easing}`,
        }}/>
      </div>
      <div>
        <p style={{ fontSize: 13, fontWeight: 600, color: '#ccc', marginBottom: 4 }}>{label}</p>
        <p style={{ fontSize: 11, color: '#555', fontFamily: 'monospace' }}>{duration} · {easing}</p>
        <p style={{ fontSize: 11, color: '#444', marginTop: 2 }}>↳ {property}</p>
      </div>
      <button onClick={() => { setActive(v => !v); }}
        style={{
          background: 'rgba(245,166,35,0.08)', border: '1px solid rgba(245,166,35,0.2)',
          borderRadius: 6, padding: '5px 10px', color: '#F5A623', fontSize: 11, cursor: 'pointer',
        }}>Animar</button>
    </div>
  );
};

// ── CODE BLOCK ────────────────────────────────────────────────
const Code = ({ children }) => (
  <pre style={{
    background: '#0D0D15', border: '1px solid #1A1A24', borderRadius: 10,
    padding: '16px 20px', fontSize: 12, color: '#888', lineHeight: 1.7,
    overflowX: 'auto', fontFamily: 'monospace',
  }}><code style={{ color: '#ccc' }}>{children}</code></pre>
);

// ── PROGRESS BAR ──────────────────────────────────────────────
const ProgressBar = ({ value, max, color = '#2ECC71', label }) => (
  <div>
    {label && (
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: '#555' }}>{label}</span>
        <span style={{ fontSize: 12, color, fontWeight: 600 }}>{Math.round(value/max*100)}%</span>
      </div>
    )}
    <div style={{ height: 6, background: '#1A1A24', borderRadius: 99, overflow: 'hidden' }}>
